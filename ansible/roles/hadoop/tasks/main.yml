---
# Extract Hadoop from shared folder

- name: Check if Hadoop already extracted
  stat:
    path: "{{ hadoop_home }}/bin/hadoop"
  register: hadoop_extracted
  tags: hadoop

- name: Extract Hadoop from shared folder
  unarchive:
    src: "/vagrant_shared/hadoop-{{ hadoop_version }}.tar.gz"
    dest: "/home/hadoop/"
    remote_src: yes
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
  when: not hadoop_extracted.stat.exists
  tags: hadoop

- name: Create symbolic link for hadoop
  file:
    src: "/home/hadoop/hadoop-{{ hadoop_version }}"
    dest: "{{ hadoop_home }}"
    state: link
  when: not hadoop_extracted.stat.exists
  tags: hadoop

- name: Set ownership of hadoop directory
  file:
    path: "/home/hadoop/hadoop-{{ hadoop_version }}"
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
    recurse: yes
  tags: hadoop

- name: Ensure hadoop home directory is accessible to all users
  file:
    path: "/home/hadoop"
    mode: '0755'
    state: directory
  tags: hadoop

- name: Ensure Hadoop installation directory is accessible
  file:
    path: "/home/hadoop/hadoop-{{ hadoop_version }}"
    mode: '0755'
    state: directory
  tags: hadoop

# Create Hadoop data directories

- name: Create NameNode data directory
  file:
    path: "{{ hadoop_data_dir }}/namenode"
    state: directory
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
    mode: '0755'
  when: inventory_hostname == 'master'
  tags: hadoop

- name: Create DataNode data directory
  file:
    path: "{{ hadoop_data_dir }}/datanode"
    state: directory
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
    mode: '0755'
  when: inventory_hostname in groups['datanodes']
  tags: hadoop

# Set HADOOP_HOME environment
- name: Set HADOOP_HOME in hadoop-env.sh
  lineinfile:
    path: "{{ hadoop_home }}/etc/hadoop/hadoop-env.sh"
    regexp: '^export HADOOP_HOME='
    line: "export HADOOP_HOME={{ hadoop_home }}"
    state: present
  tags: hadoop

- name: Set JAVA_HOME in hadoop-env.sh
  lineinfile:
    path: "{{ hadoop_home }}/etc/hadoop/hadoop-env.sh"
    regexp: '^export JAVA_HOME='
    line: "export JAVA_HOME=/usr/lib/jvm/java-{{ java_version }}-openjdk-amd64"
    state: present
  tags: hadoop

- name: Set HADOOP_CONF_DIR in hadoop-env.sh
  lineinfile:
    path: "{{ hadoop_home }}/etc/hadoop/hadoop-env.sh"
    regexp: '^export HADOOP_CONF_DIR='
    line: "export HADOOP_CONF_DIR={{ hadoop_home }}/etc/hadoop"
    state: present
  tags: hadoop

# Deploy configuration files
- name: Deploy core-site.xml
  template:
    src: core-site.xml.j2
    dest: "{{ hadoop_home }}/etc/hadoop/core-site.xml"
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
    mode: '0644'
  tags: hadoop

- name: Deploy hdfs-site.xml
  template:
    src: hdfs-site.xml.j2
    dest: "{{ hadoop_home }}/etc/hadoop/hdfs-site.xml"
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
    mode: '0644'
  tags: hadoop

- name: Deploy yarn-site.xml
  template:
    src: yarn-site.xml.j2
    dest: "{{ hadoop_home }}/etc/hadoop/yarn-site.xml"
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
    mode: '0644'
  tags: hadoop

- name: Deploy mapred-site.xml
  template:
    src: mapred-site.xml.j2
    dest: "{{ hadoop_home }}/etc/hadoop/mapred-site.xml"
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
    mode: '0644'
  tags: hadoop

- name: Deploy workers file
  template:
    src: workers.j2
    dest: "{{ hadoop_home }}/etc/hadoop/workers"
    owner: "{{ hadoop_user }}"
    group: "{{ hadoop_group }}"
    mode: '0644'
  tags: hadoop

# Ensure all users can execute Hadoop commands
- name: Set execute permissions on Hadoop bin directory
  file:
    path: "{{ hadoop_home }}/bin"
    mode: '0755'
    state: directory
  tags: hadoop

- name: Set execute permissions on Hadoop sbin directory
  file:
    path: "{{ hadoop_home }}/sbin"
    mode: '0755'
    state: directory
  tags: hadoop

- name: Make all scripts in bin directory executable
  shell: chmod +x {{ hadoop_home }}/bin/*
  tags: hadoop
  changed_when: false

- name: Make all scripts in sbin directory executable
  shell: chmod +x {{ hadoop_home }}/sbin/*
  tags: hadoop
  changed_when: false

- name: Ensure Hadoop config directory is readable by all
  file:
    path: "{{ hadoop_home }}/etc/hadoop"
    mode: '0755'
    state: directory
  tags: hadoop
